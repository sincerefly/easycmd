codecov:
  require_ci_to_pass: yes
coverage:
  status:
    patch: no
    project:
      default:
        target: 90%
        threshold: 1%
        if_not_found: success
    changes: no
  precision: 2
  range: "70...100"
ignore:
  - "main.go"
  - "internal/testutil/**"
  - "test/.*"
  - ".github/.*"
  - "images/.*"
  - ".mvn/.*"
  - ".style/.*"
  - "*.md"
comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
