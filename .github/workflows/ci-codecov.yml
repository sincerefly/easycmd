name: CodeCoverage

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go:
          - '1.26.5'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: Build and test
        run: |
          go test -v -race -coverprofile=coverage.txt -covermode=atomic \
            github.com/sincerefly/easycmd/cmd \
            github.com/sincerefly/easycmd/common \
            github.com/sincerefly/easycmd/utils/random \
            github.com/sincerefly/easycmd/utils/requests
          go tool cover -func=coverage.txt | tee coverage-summary.txt
          awk '/^total:/ {gsub(/%/,"",$3); total=$3} END { if (total+0 < 90) { print "coverage below 90%: " total; exit 1 } }' coverage-summary.txt

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.txt
          disable_search: true
          fail_ci_if_error: true
          use_oidc: true
          verbose: true
